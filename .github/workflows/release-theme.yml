name: Release Theme

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update theme version in style.css
        run: |
          sed -i "s/^Version: .*/Version: ${{ steps.version.outputs.version }}/" theme/style.css

      - name: Build theme zip
        run: |
          cd theme
          zip -r ../hopham-vietnam-${{ steps.version.outputs.version }}.zip . \
            -x "*.DS_Store" "*__MACOSX*" "*.git*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Họ Phạm Việt Nam v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: hopham-vietnam-${{ steps.version.outputs.version }}.zip
