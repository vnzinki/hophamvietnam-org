name: Release Theme

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update theme version in style.css
        run: |
          sed -i "s/^Version: .*/Version: ${{ steps.version.outputs.version }}/" theme/style.css

      - name: Build theme zip
        run: |
          cd theme
          zip -r ../hopham-vietnam-${{ steps.version.outputs.version }}.zip . \
            -x "*.DS_Store" "*__MACOSX*" "*.git*"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF_NAME}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Previous ref: $PREV_TAG"

          # Generate changelog from commits
          CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | grep -v "^- Merge")
          # Escape for GitHub Actions
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "notes<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Họ Phạm Việt Nam v${{ steps.version.outputs.version }}
          body: |
            ## Changes

            ${{ steps.changelog.outputs.notes }}

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ env.PREV_TAG || 'v1.0.0' }}...${{ github.ref_name }}
          files: hopham-vietnam-${{ steps.version.outputs.version }}.zip
