<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
  <!-- Vietnamese sedge mat (chiếu cói) basketweave pattern -->
  <!-- Horizontal strips -->
  <rect x="0"  y="0"  width="30" height="10" fill="#C8A84E" opacity="0.5"/>
  <rect x="30" y="0"  width="30" height="10" fill="#B89840" opacity="0.4"/>
  <rect x="0"  y="10" width="30" height="10" fill="#A68A3E" opacity="0.35"/>
  <rect x="30" y="10" width="30" height="10" fill="#C8A84E" opacity="0.45"/>
  <rect x="0"  y="20" width="30" height="10" fill="#B89840" opacity="0.4"/>
  <rect x="30" y="20" width="30" height="10" fill="#A68A3E" opacity="0.35"/>
  <rect x="0"  y="30" width="30" height="10" fill="#B89840" opacity="0.4"/>
  <rect x="30" y="30" width="30" height="10" fill="#C8A84E" opacity="0.5"/>
  <rect x="0"  y="40" width="30" height="10" fill="#C8A84E" opacity="0.45"/>
  <rect x="30" y="40" width="30" height="10" fill="#A68A3E" opacity="0.35"/>
  <rect x="0"  y="50" width="30" height="10" fill="#A68A3E" opacity="0.35"/>
  <rect x="30" y="50" width="30" height="10" fill="#B89840" opacity="0.4"/>
  <!-- Vertical weave overlay strips -->
  <rect x="0"  y="0"  width="10" height="30" fill="#8B7335" opacity="0.2"/>
  <rect x="10" y="0"  width="10" height="30" fill="#D4B85A" opacity="0.15"/>
  <rect x="20" y="0"  width="10" height="30" fill="#8B7335" opacity="0.2"/>
  <rect x="30" y="30" width="10" height="30" fill="#8B7335" opacity="0.2"/>
  <rect x="40" y="30" width="10" height="30" fill="#D4B85A" opacity="0.15"/>
  <rect x="50" y="30" width="10" height="30" fill="#8B7335" opacity="0.2"/>
  <!-- Subtle weave edge lines -->
  <line x1="0" y1="10" x2="30" y2="10" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="20" x2="30" y2="20" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="30" x2="60" y2="30" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="40" x2="60" y2="40" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="50" x2="60" y2="50" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="10" y1="0" x2="10" y2="30" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="0" x2="20" y2="30" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="0" x2="30" y2="60" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="40" y1="30" x2="40" y2="60" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="30" x2="50" y2="60" stroke="#7A6530" stroke-width="0.5" opacity="0.3"/>
</svg>
